name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  POLARS_AUTO_NEW_STREAMING: "0"

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev
    - name: Build
      run: |
        cargo build --workspace --exclude plotlars --verbose
        cargo build -p plotlars --features plotly --verbose
        cargo build -p plotlars --features plotters --verbose
    - name: Build examples
      run: |
        cargo build -p plotlars --features plotly --examples
        cargo build -p plotlars --features plotters --examples
    - name: Format
      run: cargo fmt --all -- --check
    - name: Clippy
      run: |
        cargo clippy --workspace --exclude plotlars --all-targets -- -D warnings
        cargo clippy -p plotlars --features plotly --all-targets -- -D warnings
        cargo clippy -p plotlars --features plotters -- -D warnings
    - name: Test
      run: cargo test --workspace --exclude plotlars
    - name: Test IO features
      run: cargo test -p plotlars-core --features format-json,format-excel
    - name: Clippy IO features
      run: cargo clippy -p plotlars-core --features format-json,format-excel --all-targets -- -D warnings
    - name: Machete
      uses: bnjbvr/cargo-machete@main
